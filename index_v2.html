    detail+='<div class="detail-section" id="okDetail"><div class="dt">처리 완료 품목코드</div><div class="dc">'+(sc.length>0?sc.join('<br>'):'없음')+'</div></div>';
    if(fc.length>0){
      detail+='<div class="detail-section fail-detail" id="failDetail"><div class="dt">미등록 품목코드</div><div class="dc">'+fc.join('<br>')+'</div></div>';
    }
    document.getElementById('resultDetail').innerHTML=detail;

    document.getElementById('reviewOverlay').classList.remove('show');
    document.getElementById('scannerOverlay').classList.remove('show');
    document.getElementById('resultOverlay').classList.add('show');unlockAudio();setTimeout(confirmFeedback,80);
  })
  .catch(function(err){
    document.getElementById('procOverlay').classList.remove('show');
    alert('네트워크 오류: '+err.message);

/* ══════════════════════════════════════
   Android 뒤로가기 버튼 처리
   ══════════════════════════════════════ */

var historyDepth=0;
var skipNextPopstate=false;

function histPush(){historyDepth++;history.pushState({app:historyDepth},'');}
function histBack(){if(historyDepth>0)history.back()}

/* 뒤로가기 시 최상위 오버레이 닫기 */
window.addEventListener('popstate',function(){
  if(skipNextPopstate){skipNextPopstate=false;return}
  if(historyDepth>0)historyDepth--;

  var adv=document.getElementById('advOverlay');
  var modal=document.getElementById('locModal');
  var review=document.getElementById('reviewOverlay');
  var scanner=document.getElementById('scannerOverlay');

  if(adv.classList.contains('show')){
    adv.classList.remove('show');
  }else if(document.getElementById('consignModal').classList.contains('show')){
    document.getElementById('consignModal').classList.remove('show');
  }else if(modal.classList.contains('show')){
    modal.classList.remove('show');
  }else if(review.classList.contains('show')){
    if(moveScannedTotal>0){
      if(!confirm('스캔한 '+moveScannedTotal+'건의 데이터가 초기화됩니다.\n정말 나가시겠습니까?')){
        histPush();return;
      }
    }
    review.classList.remove('show');
  }else if(scanner.classList.contains('show')){
    /* location 모드: 경고 없이 그냥 닫고 위치 모달 복귀 */
    if(scanMode==='location'){
      scanner.classList.remove('show');
      stopScanner();
      document.getElementById('locModal').classList.add('show');
      return;
    }
    /* 이동모드에서 스캔 데이터가 있으면 경고 */
    if(scanMode==='move'&&moveScannedTotal>0&&!scanFromReview){
      if(!confirm('스캔한 '+moveScannedTotal+'건의 데이터가 초기화됩니다.\n정말 나가시겠습니까?')){
        /* 취소 → history 복원 */
        histPush();return;
      }
    }
    scanner.classList.remove('show');
    stopScanner();
    if(scanFromReview){
      scanFromReview=false;
      renderReviewTable();
      review.classList.add('show');
    }
  }
});

/* 열기: histPush */
var _o1=openScanner;openScanner=function(m){histPush();_o1(m)};
var _o2=promptLocation;promptLocation=function(){histPush();_o2()};

/* showReview: scanner를 닫고 review를 여는데 history 깊이는 유지 (교체) */
var _o3=showReview;showReview=function(){_o3()};

/* 닫기 버튼: histBack (popstate가 실제 닫기 처리) */
document.querySelector('.rv-close').setAttribute('onclick','histBack()');
document.querySelector('.modal-cancel').setAttribute('onclick','histBack()');

/* 상품이동 완료 후 모든 overlay 닫고 history 초기화 */
var _execMove=executeMove;
executeMove=function(){
  var location=document.getElementById('locInput').value.trim();

  /* 모달을 먼저 닫고 confirm 표시 (iOS Safari 호환) */
  document.getElementById('locModal').classList.remove('show');

  /* 빈 입력 → 상품위치 삭제 확인 */
  if(!location){
    if(!window.confirm('상품위치 정보를 삭제하시겠습니까?')){
      /* 취소 → 모달 다시 열기 */
      document.getElementById('locModal').classList.add('show');
      return;
    }
  }

  var cbs=document.querySelectorAll('.rv-cb:checked');
  var items=[];for(var i=0;i<cbs.length;i++){items.push({code:cbs[i].getAttribute('data-code')})}

  document.getElementById('procOverlay').classList.add('show');
  document.getElementById('procText').textContent=location
    ?items.length+'종 상품 → '+location+' 이동 처리 중...'
    :items.length+'종 상품 위치 정보 삭제 중...';

  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'move',items:items,location:location})
  })
  .then(function(r){return r.json()})
  .then(function(res){
    document.getElementById('procOverlay').classList.remove('show');
    if(!res.success){alert('오류: '+(res.error||''));return}

    if(inventory){
      var mc={};for(var mi=0;mi<items.length;mi++)mc[items[mi].code]=true;
      for(var ri=0;ri<inventory.length;ri++){if(mc[inventory[ri].c])inventory[ri].p=location}
    }

    /* 결과 화면 표시 */
    var isDelete=!location;
    var sc=res.successCodes||[];
    var fc=res.failedCodes||[];
    var req=res.requested||items.length;

    document.getElementById('resultIcon').textContent=fc.length>0?'⚠️':'✅';
    document.getElementById('resultTitle').textContent=isDelete?'상품위치 삭제 완료':'상품 이동 완료';

    var rows='';
    if(!isDelete)rows+='<div class="result-row loc"><span class="rlabel">위치</span><span class="rvalue">'+esc(res.location)+'</span></div>';
    rows+='<div class="result-row req"><span class="rlabel">요청</span><span class="rvalue">'+req+'건</span></div>';
    rows+='<div class="result-row ok"><span class="rlabel">처리</span><span class="rvalue">'+sc.length+'건 <span class="detail-link" onclick="toggleDetail(\'okDetail\')">상세보기</span></span></div>';
    if(fc.length>0){
      rows+='<div class="result-row fail"><span class="rlabel">실패</span><span class="rvalue">'+fc.length+'건 <span class="detail-link" onclick="toggleDetail(\'failDetail\')">상세보기</span></span></div>';
    }
    document.getElementById('resultRows').innerHTML=rows;

    var detail='';
    detail+='<div class="detail-section" id="okDetail"><div class="dt">처리 완료 품목코드</div><div class="dc">'+(sc.length>0?sc.join('<br>'):'없음')+'</div></div>';
    if(fc.length>0){
      detail+='<div class="detail-section fail-detail" id="failDetail"><div class="dt">실패 품목코드 (Data/Data2에 없음)</div><div class="dc">'+fc.join('<br>')+'</div></div>';
    }
    document.getElementById('resultDetail').innerHTML=detail;

    document.getElementById('reviewOverlay').classList.remove('show');
    document.getElementById('scannerOverlay').classList.remove('show');
    document.getElementById('resultOverlay').classList.add('show');unlockAudio();setTimeout(confirmFeedback,80);
  })
  .catch(function(err){
    document.getElementById('procOverlay').classList.remove('show');
    alert('서버 연결 실패: '+err.message);
  });
};

function toggleDetail(id){
  var el=document.getElementById(id);
  if(el)el.classList.toggle('show');
}

function closeResult(){
  document.getElementById('resultOverlay').classList.remove('show');
  if(historyDepth>0)history.go(-historyDepth);
  historyDepth=0;
}

/* 안드로이드 키보드 대응: 모달을 키보드 위로 이동 */
if(window.visualViewport){
  var modalBox=null;
  window.visualViewport.addEventListener('resize',function(){
    modalBox=document.querySelector('.modal-bg.show .modal-box');
    if(!modalBox)return;
    var kbHeight=window.innerHeight-window.visualViewport.height;
    if(kbHeight>100){
      modalBox.style.transform='translateY(-'+Math.floor(kbHeight*0.4)+'px)';
    }else{
      modalBox.style.transform='';
    }
  });
  window.visualViewport.addEventListener('scroll',function(){
    if(modalBox)modalBox.style.transform='';
  });
}
