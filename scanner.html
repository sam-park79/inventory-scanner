<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>바코드 스캔</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--card:#222633;--border:#2e3345;
      --text:#e8eaf0;--text2:#9ba1b5;--accent:#4f8cff;--green:#34d399;--red:#f87171;
      --font:'Noto Sans KR',system-ui,-apple-system,sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}

    .wrap{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto}

    .top{display:flex;justify-content:space-between;align-items:center;
      padding:12px 16px;border-bottom:1px solid var(--border)}
    .top h1{font-size:17px;font-weight:700}
    .top-btns{display:flex;gap:8px}
    .btn-t{background:var(--card);border:1px solid var(--border);color:var(--text);
      height:38px;padding:0 14px;border-radius:10px;font-size:13px;font-weight:500;
      font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
    .btn-t.active{background:#fbbf24;color:#000;border-color:#fbbf24}
    a.btn-t{text-decoration:none}

    .camera{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:8px;overflow:hidden}
    #reader{width:100%;max-width:480px;border-radius:14px;overflow:hidden}

    .hint{text-align:center;padding:10px 20px;font-size:13px;color:var(--text2);line-height:1.5}

    /* 성공 오버레이 */
    .ok-overlay{position:fixed;inset:0;background:rgba(15,17,23,.95);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      z-index:100;padding:40px 20px;text-align:center}
    .ok-overlay.show{display:flex}
    .ok-icon{font-size:64px;margin-bottom:20px}
    .ok-code{font-size:22px;font-weight:700;color:var(--green);
      background:rgba(52,211,153,.1);padding:12px 24px;border-radius:14px;
      border:1px solid rgba(52,211,153,.25);margin-bottom:12px;word-break:break-all}
    .ok-msg{font-size:14px;color:var(--text2);margin-bottom:24px}
    .ok-sp{width:24px;height:24px;border:3px solid var(--border);
      border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}

    .err-bar{margin:8px 16px;padding:12px 16px;background:rgba(248,113,113,.1);
      border:1px solid rgba(248,113,113,.2);border-radius:12px;font-size:13px;
      color:var(--red);display:none;text-align:center}
    .err-bar.show{display:block}

    /* html5-qrcode 오버라이드 */
    #reader img[alt="Info icon"]{display:none!important}
    #html5-qrcode-anchor-scan-type-change{display:none!important}
    #html5-qrcode-button-camera-permission{
      background:var(--accent)!important;color:#fff!important;border:none!important;
      border-radius:12px!important;padding:12px 24px!important;font-size:15px!important;
      font-family:var(--font)!important;cursor:pointer!important}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>📷 바코드 스캔</h1>
      <div class="top-btns">
        <button class="btn-t" id="btnTorch" onclick="toggleTorch()">🔦 조명</button>
        <a class="btn-t" id="btnBack" href="#">돌아가기</a>
      </div>
    </div>

    <div class="camera"><div id="reader"></div></div>
    <div class="hint" id="hint">바코드를 카메라에 비춰주세요 · 자동 인식됩니다</div>
    <div class="err-bar" id="errBar"></div>
  </div>

  <div class="ok-overlay" id="okOverlay">
    <div class="ok-icon">✅</div>
    <div class="ok-code" id="okCode"></div>
    <div class="ok-msg">재고 조회 화면으로 이동합니다...</div>
    <div class="ok-sp"></div>
  </div>

<script>
var params=new URLSearchParams(window.location.search);
var returnUrl=params.get('returnUrl')||'';
var btnBack=document.getElementById('btnBack');
if(returnUrl){btnBack.href=decodeURIComponent(returnUrl)}else{btnBack.style.display='none'}

var scanner=null;
var scanned=false;
var torchOn=false;
var videoTrack=null;

/* ══ 스캐너 시작 ══ */
startScanner();

function startScanner(){
  scanner=new Html5Qrcode('reader');

  /* 카메라 제약조건: 고해상도 + 후면 카메라 */
  var cameraConfig={
    facingMode:{exact:'environment'}
  };

  var scanConfig={
    fps:15,
    qrbox:function(vw,vh){
      /* 1D 바코드용 넓은 스캔 영역 */
      var w=Math.min(vw*0.92,420);
      return{width:Math.floor(w),height:Math.floor(w*0.45)};
    },
    aspectRatio:1.777778,
    formatsToSupport:[
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODE_93
    ],
    /* 고해상도 요청 */
    videoConstraints:{
      facingMode:{exact:'environment'},
      width:{ideal:1920},
      height:{ideal:1080}
    }
  };

  scanner.start(cameraConfig,scanConfig,onScanSuccess,function(){})
  .then(function(){
    /* 카메라 시작 성공 → 자동초점 설정 */
    applyAutofocus();
  })
  .catch(function(err){
    /* exact:'environment' 실패 시 일반 후면으로 재시도 */
    cameraConfig={facingMode:'environment'};
    scanConfig.videoConstraints={facingMode:'environment',width:{ideal:1920},height:{ideal:1080}};

    scanner.start(cameraConfig,scanConfig,onScanSuccess,function(){})
    .then(function(){applyAutofocus()})
    .catch(function(err2){
      var el=document.getElementById('errBar');
      el.textContent='카메라를 사용할 수 없습니다: '+err2;
      el.classList.add('show');
    });
  });
}

/**
 * 카메라 비디오 트랙에 연속 자동초점 적용
 */
function applyAutofocus(){
  try{
    var video=document.querySelector('#reader video');
    if(!video||!video.srcObject)return;

    videoTrack=video.srcObject.getVideoTracks()[0];
    if(!videoTrack)return;

    var caps=videoTrack.getCapabilities?videoTrack.getCapabilities():{};

    /* 연속 자동초점 */
    if(caps.focusMode&&caps.focusMode.indexOf('continuous')>=0){
      videoTrack.applyConstraints({advanced:[{focusMode:'continuous'}]})
      .catch(function(){});
    }

    /* 가능하면 줌 약간 (바코드 인식률 향상) */
    if(caps.zoom&&caps.zoom.min<caps.zoom.max){
      var zoomTarget=Math.min(caps.zoom.min*1.5, caps.zoom.max);
      videoTrack.applyConstraints({advanced:[{zoom:zoomTarget}]})
      .catch(function(){});
    }
  }catch(e){
    console.warn('autofocus 설정 실패:',e);
  }
}

/**
 * 조명(토치) 토글
 */
function toggleTorch(){
  if(!videoTrack)return;
  try{
    var caps=videoTrack.getCapabilities?videoTrack.getCapabilities():{};
    if(!caps.torch)return;

    torchOn=!torchOn;
    videoTrack.applyConstraints({advanced:[{torch:torchOn}]})
    .then(function(){
      var btn=document.getElementById('btnTorch');
      btn.classList.toggle('active',torchOn);
    })
    .catch(function(){torchOn=false});
  }catch(e){}
}

/* ══ 스캔 성공 ══ */
function onScanSuccess(code){
  if(scanned)return;
  scanned=true;

  if(navigator.vibrate)navigator.vibrate(120);
  try{scanner.stop()}catch(e){}

  document.getElementById('okCode').textContent=code;
  document.getElementById('okOverlay').classList.add('show');

  if(returnUrl){
    var url=decodeURIComponent(returnUrl);
    var sep=url.indexOf('?')>=0?'&':'?';
    setTimeout(function(){window.location.href=url+sep+'code='+encodeURIComponent(code)},800);
  }
}
</script>
</body>
</html>
