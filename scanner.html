<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>바코드 스캔</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{--bg:#0f1117;--border:#2e3345;--text:#e8eaf0;--text2:#9ba1b5;--green:#34d399;--accent:#4f8cff;
      --font:'Noto Sans KR',system-ui,-apple-system,sans-serif}
    html,body{height:100%;background:#000;color:var(--text);font-family:var(--font);
      font-size:15px;overflow:hidden;-webkit-user-select:none;user-select:none}
    .wrap{display:flex;flex-direction:column;height:100dvh;height:100vh}
    .top{display:flex;justify-content:space-between;align-items:center;
      padding:10px 12px;background:rgba(15,17,23,.85);position:fixed;top:0;left:0;right:0;z-index:20;
      padding-top:max(10px,env(safe-area-inset-top))}
    .top h1{font-size:15px;font-weight:700}
    .top-btns{display:flex;gap:6px}
    .btn-t{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;
      height:34px;padding:0 10px;border-radius:10px;font-size:12px;font-weight:500;
      font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:3px;
      -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:background .2s;flex-shrink:0}
    .btn-t:active{background:rgba(255,255,255,.2)}
    .btn-t.active{background:rgba(251,191,36,.9);color:#000;border-color:transparent}
    .btn-t.switch{background:rgba(79,140,255,.2);border-color:rgba(79,140,255,.3)}
    a.btn-t{text-decoration:none}
    .video-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;
      background:#000;overflow:hidden}
    #video{width:100%;height:100%;-o-object-fit:cover;object-fit:cover}
    .scan-overlay{position:fixed;inset:0;z-index:10;pointer-events:none;
      display:flex;align-items:center;justify-content:center}
    .scan-guide{position:relative;width:90%;max-width:440px;aspect-ratio:1.8/1;
      border:2.5px solid var(--green);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
    .scan-line{position:absolute;left:8%;right:8%;height:2px;background:var(--green);border-radius:2px;
      opacity:.7;-webkit-animation:scanAnim 2s ease-in-out infinite alternate;animation:scanAnim 2s ease-in-out infinite alternate}
    @keyframes scanAnim{0%{top:15%}100%{top:85%}}
    #iosReader{flex:1;background:#000;display:none}
    #iosReader video{-o-object-fit:cover!important;object-fit:cover!important}
    #iosReader img[alt="Info icon"]{display:none!important}
    #html5-qrcode-anchor-scan-type-change{display:none!important}
    .bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;
      background:rgba(15,17,23,.85);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
      padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));text-align:center}
    .hint{font-size:13px;color:var(--text2);line-height:1.4}
    .read-count{font-size:12px;color:var(--green);margin-top:3px;min-height:17px;font-weight:600}
    .cam-info{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
    .ok-overlay{position:fixed;inset:0;background:rgba(15,17,23,.95);
      display:none;flex-direction:column;align-items:center;justify-content:center;
      z-index:100;padding:40px 20px;text-align:center}
    .ok-overlay.show{display:flex}
    .ok-icon{font-size:64px;margin-bottom:20px}
    .ok-code{font-size:20px;font-weight:700;color:var(--green);background:rgba(52,211,153,.1);
      padding:12px 24px;border-radius:14px;border:1px solid rgba(52,211,153,.25);margin-bottom:12px;word-break:break-all}
    .ok-msg{font-size:14px;color:var(--text2);margin-bottom:24px}
    .ok-sp{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);
      border-radius:50%;-webkit-animation:sp .7s linear infinite;animation:sp .7s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .err-full{position:fixed;inset:0;background:var(--bg);z-index:50;
      display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
    .err-full.show{display:flex}
    .err-full .icon{font-size:56px;margin-bottom:20px;opacity:.6}
    .err-full p{font-size:15px;color:var(--text2);line-height:1.7;margin-bottom:20px}
    .err-full a{color:var(--accent);font-size:14px}
    #cropCanvas{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>📷 바코드 스캔</h1>
      <div class="top-btns">
        <button class="btn-t switch" id="btnSwitch" onclick="switchCamera()">🔄 전환</button>
        <button class="btn-t" id="btnTorch" onclick="toggleTorch()">🔦</button>
        <a class="btn-t" id="btnBack" href="#">닫기</a>
      </div>
    </div>
    <div class="video-wrap" id="androidArea"><video id="video" autoplay playsinline muted></video></div>
    <div class="scan-overlay" id="scanOverlay"><div class="scan-guide"><div class="scan-line"></div></div></div>
    <div id="iosReader"></div>
    <div class="bottom-bar">
      <div class="hint">바코드를 카메라에 비춰주세요</div>
      <div class="read-count" id="readCount"></div>
      <div class="cam-info" id="camInfo"></div>
    </div>
  </div>
  <div class="ok-overlay" id="okOverlay">
    <div class="ok-icon">✅</div><div class="ok-code" id="okCode"></div>
    <div class="ok-msg">재고 조회 화면으로 이동합니다...</div><div class="ok-sp"></div>
  </div>
  <div class="err-full" id="errFull">
    <div class="icon">📸</div><p id="errMsg">카메라를 사용할 수 없습니다.</p>
    <a id="btnBackErr" href="#">돌아가기</a>
  </div>
  <canvas id="cropCanvas"></canvas>

<script>
var CONFIRM_COUNT=3;
var params=new URLSearchParams(window.location.search);
var returnUrl=params.get('returnUrl')||'';
document.getElementById('btnBack').href=returnUrl?decodeURIComponent(returnUrl):'#';
document.getElementById('btnBackErr').href=returnUrl?decodeURIComponent(returnUrl):'#';

var readCountEl=document.getElementById('readCount');
var camInfoEl=document.getElementById('camInfo');
var scanned=false,lastCode='',matchCount=0,torchOn=false;
var activeTrack=null;
var useNative='BarcodeDetector' in window;

/* ══ 피드백: 진동(Android) + 비프음(iOS/공통) ══ */
var audioCtx=null;

function feedback(){
  /* 진동 (Android) */
  if(navigator.vibrate)navigator.vibrate(150);

  /* 비프음 (iOS 포함 모든 기기) */
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.value=1200;
    gain.gain.value=0.3;
    osc.start();
    osc.stop(audioCtx.currentTime+0.15);
  }catch(e){}
}

function feedbackConfirm(){
  if(navigator.vibrate)navigator.vibrate([100,50,100]);
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var now=audioCtx.currentTime;
    var osc=audioCtx.createOscillator();var gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(1000,now);
    osc.frequency.setValueAtTime(1400,now+0.1);
    gain.gain.value=0.3;
    osc.start(now);osc.stop(now+0.2);
  }catch(e){}
}

/* ══ 공통: 카메라 목록 ══ */
var allCameras=[],currentCamIndex=0;

function discoverCameras(){
  return navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
  .then(function(t){t.getTracks().forEach(function(x){x.stop()});return navigator.mediaDevices.enumerateDevices()})
  .then(function(devs){
    allCameras=devs.filter(function(d){
      if(d.kind!=='videoinput')return false;
      var l=(d.label||'').toLowerCase();
      return l.indexOf('front')<0&&l.indexOf('selfie')<0&&l.indexOf('전면')<0;
    });
    if(!allCameras.length)allCameras=devs.filter(function(d){return d.kind==='videoinput'});
    var s='';try{s=localStorage.getItem('SCAN_CAM_ID')||''}catch(e){}
    if(s){for(var i=0;i<allCameras.length;i++){if(allCameras[i].deviceId===s){currentCamIndex=i;break}}}
  });
}

function switchCamera(){
  if(allCameras.length<=1){camInfoEl.textContent='전환 가능한 카메라가 없습니다';return}
  currentCamIndex=(currentCamIndex+1)%allCameras.length;
  resetMatch();torchOn=false;document.getElementById('btnTorch').classList.remove('active');
  camInfoEl.textContent='전환 중... ('+(currentCamIndex+1)+'/'+allCameras.length+')';
  if(useNative)startAndroidCam(currentCamIndex);else startIOSCam(currentCamIndex);
}

/* ══ 공통: 조명 ══ */
function toggleTorch(){
  if(!activeTrack){
    try{var v=document.querySelector('#iosReader video');
      if(v&&v.srcObject)activeTrack=v.srcObject.getVideoTracks()[0]}catch(e){}
  }
  if(!activeTrack)return;
  try{
    var caps=activeTrack.getCapabilities?activeTrack.getCapabilities():{};
    if(!caps.torch)return;
    torchOn=!torchOn;
    activeTrack.applyConstraints({advanced:[{torch:torchOn}]}).then(function(){
      document.getElementById('btnTorch').classList.toggle('active',torchOn);
    }).catch(function(){torchOn=false});
  }catch(e){}
}

/* ══ 공통: 스캔 결과 ══ */
function onCodeRead(code){
  if(scanned)return;
  if(code===lastCode)matchCount++;else{lastCode=code;matchCount=1}
  readCountEl.textContent='✓ '+code+' ('+matchCount+'/'+CONFIRM_COUNT+')';

  /* 인식될 때마다 피드백 */
  feedback();

  if(matchCount>=CONFIRM_COUNT)onScanConfirmed(code);
}
function resetMatch(){if(matchCount>0){matchCount=0;lastCode='';readCountEl.textContent=''}}

function onScanConfirmed(code){
  if(scanned)return;scanned=true;
  if(useNative)stopAndroid();else{try{iosScanner.stop()}catch(e){}}

  /* 확정 피드백 */
  feedbackConfirm();

  document.getElementById('okCode').textContent=code;
  document.getElementById('okOverlay').classList.add('show');
  if(returnUrl){
    var url=decodeURIComponent(returnUrl);
    var sep=url.indexOf('?')>=0?'&':'?';
    setTimeout(function(){window.location.href=url+sep+'code='+encodeURIComponent(code)},800);
  }
}

/* ══════════════════════════════════════
   Android: 커스텀 카메라 + BarcodeDetector
   ══════════════════════════════════════ */
var video,cropCanvas,cropCtx,nativeDetector,scanTimer;

function initAndroid(){
  document.getElementById('iosReader').style.display='none';
  video=document.getElementById('video');
  cropCanvas=document.getElementById('cropCanvas');
  cropCtx=cropCanvas.getContext('2d');
  nativeDetector=new BarcodeDetector({
    formats:['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','code_93','codabar','qr_code']
  });
  discoverCameras().then(function(){
    if(!allCameras.length){showError('카메라를 찾을 수 없습니다.');return}
    document.getElementById('btnSwitch').textContent='🔄 전환 ('+allCameras.length+'대)';
    return startAndroidCam(currentCamIndex);
  }).catch(function(){showError('카메라 권한을 확인해 주세요.')});
}

function startAndroidCam(idx){
  stopAndroid();var cam=allCameras[idx];if(!cam)return;
  navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:cam.deviceId}},audio:false})
  .catch(function(){return navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})})
  .then(function(stream){
    video.srcObject=stream;activeTrack=stream.getVideoTracks()[0];
    var s=activeTrack.getSettings?activeTrack.getSettings():{};
    camInfoEl.textContent=(activeTrack.label||'카메라 '+(idx+1))+' ('+(s.width||'?')+'x'+(s.height||'?')+')';
    try{localStorage.setItem('SCAN_CAM_ID',cam.deviceId)}catch(e){}
    return video.play();
  }).then(function(){
    if(!scanned){if(scanTimer)clearInterval(scanTimer);
      scanTimer=setInterval(function(){
        if(scanned||video.readyState<2)return;
        var vw=video.videoWidth,vh=video.videoHeight;if(!vw||!vh)return;
        var gw=vw*.9,gh=gw/1.8,gx=(vw-gw)/2,gy=(vh-gh)/2;
        cropCanvas.width=gw;cropCanvas.height=gh;
        cropCtx.drawImage(video,gx,gy,gw,gh,0,0,gw,gh);
        nativeDetector.detect(cropCanvas).then(function(r){
          if(r.length>0)onCodeRead(r[0].rawValue);else resetMatch();
        }).catch(function(){});
      },100);
    }
  });
}

function stopAndroid(){
  if(scanTimer){clearInterval(scanTimer);scanTimer=null}
  if(video&&video.srcObject){video.srcObject.getTracks().forEach(function(t){t.stop()});video.srcObject=null}
  activeTrack=null;
}

/* ══════════════════════════════════════
   iOS: html5-qrcode (전체 프레임 스캔)
   ══════════════════════════════════════ */
var iosScanner=null;

function initIOS(){
  document.getElementById('androidArea').style.display='none';
  document.getElementById('scanOverlay').style.display='none';
  document.getElementById('iosReader').style.display='block';
  iosScanner=new Html5Qrcode('iosReader');
  discoverCameras().then(function(){
    if(!allCameras.length){showError('카메라를 찾을 수 없습니다.');return}
    document.getElementById('btnSwitch').textContent='🔄 전환 ('+allCameras.length+'대)';
    return startIOSCam(currentCamIndex);
  }).catch(function(){showError('카메라 권한을 확인해 주세요.')});
}

function startIOSCam(idx){
  try{iosScanner.stop().catch(function(){})}catch(e){}
  var cam=allCameras[idx];if(!cam)return;

  setTimeout(function(){
    iosScanner.start(
      cam.deviceId,
      {
        fps:15,
        /* 스캔 영역 제한 없음 — 전체 프레임에서 바코드 검출 */
        /* formatsToSupport 미지정 — 모든 포맷 시도 */
      },
      function(decoded){onCodeRead(decoded)},
      function(){}
    ).then(function(){
      try{var v=document.querySelector('#iosReader video');
        if(v&&v.srcObject){activeTrack=v.srcObject.getVideoTracks()[0];
          var s=activeTrack.getSettings?activeTrack.getSettings():{};
          camInfoEl.textContent=(activeTrack.label||'카메라 '+(idx+1))+' ('+(s.width||'?')+'x'+(s.height||'?')+')'}}catch(e){}
      try{localStorage.setItem('SCAN_CAM_ID',cam.deviceId)}catch(e){}
    }).catch(function(err){
      /* deviceId 실패 시 facingMode로 재시도 */
      iosScanner.start(
        {facingMode:'environment'},
        {fps:15},
        function(decoded){onCodeRead(decoded)},
        function(){}
      ).then(function(){
        camInfoEl.textContent='기본 후면 카메라';
        try{var v=document.querySelector('#iosReader video');
          if(v&&v.srcObject)activeTrack=v.srcObject.getVideoTracks()[0]}catch(e){}
      }).catch(function(err2){
        showError('카메라를 시작할 수 없습니다.<br>'+err2);
      });
    });
  },300);
}

/* ══ 초기화 ══ */
if(useNative)initAndroid();else initIOS();

function showError(msg){document.getElementById('errMsg').innerHTML=msg;document.getElementById('errFull').classList.add('show')}
window.addEventListener('beforeunload',function(){if(useNative)stopAndroid();else{try{iosScanner.stop()}catch(e){}}});
</script>
</body>
</html>
